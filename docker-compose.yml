# HBntory Docker Compose — External Product API, PostgreSQL, Product MCP Server.
#
# Builds the official read-only catalog from hbtn-edu/hbntory-products-api
# without copying or modifying that repository. PostgreSQL stores HBntory's
# local users, branches, and stock. The Product MCP Server exposes read-only
# product tools and never receives PostgreSQL credentials.
#
# Official source: https://github.com/hbtn-edu/hbntory-products-api
# Official host URL: http://localhost:5001
# In-network service URL: http://external-products-api:5000
# MCP Streamable HTTP (host): http://localhost:8001/mcp
# MCP Streamable HTTP (network): http://product-mcp-server:8001/mcp

services:
  external-products-api:
    build:
      context: https://github.com/hbtn-edu/hbntory-products-api.git#main
    image: hbntory-external-products-api:local
    container_name: hbntory-external-products-api
    environment:
      HBN_PRODUCTS_PORT: ${HBN_PRODUCTS_PORT:-5000}
      HBN_PRODUCTS_LATENCY_MS: ${HBN_PRODUCTS_LATENCY_MS:-0}
    ports:
      - "${PRODUCT_API_HOST_PORT:-5001}:${HBN_PRODUCTS_PORT:-5000}"
    restart: unless-stopped
    # Uses the official GET /health endpoint with Python already present
    # in the official image (python:3.11-slim). No extra tools required.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port = os.environ.get('HBN_PRODUCTS_PORT', '5000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16.6-alpine
    container_name: hbntory-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hbntory}
      POSTGRES_USER: ${POSTGRES_USER:-hbntory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-before-running-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - hbntory-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  product-mcp-server:
    build:
      context: .
      dockerfile: product_mcp_server/Dockerfile
    image: hbntory-product-mcp-server:local
    container_name: hbntory-product-mcp-server
    environment:
      PRODUCT_API_URL: ${PRODUCT_API_URL_DOCKER:-http://external-products-api:5000}
      PRODUCT_API_TIMEOUT: ${PRODUCT_API_TIMEOUT:-5.0}
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT:-8001}
      MCP_TRANSPORT: streamable-http
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-INFO}
    ports:
      - "${MCP_HOST_PORT:-8001}:${MCP_PORT:-8001}"
    depends_on:
      external-products-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port = os.environ.get('MCP_PORT', '8001'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  hbntory-postgres-data:
